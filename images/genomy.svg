<svg xmlns="http://www.w3.org/2000/svg" width="700" height="420" viewBox="0 0 700 420">
  <rect width="100%" height="100%" fill="#fff"/>
  <g transform="translate(20,20)">
    <text x="340" y="30" font-family="Poppins, sans-serif" font-size="18" fill="#0f172a" text-anchor="middle">Genom jądrowy vs mitochondrialny</text>
    <g transform="translate(40,70)">
      <rect x="0" y="0" width="300" height="220" rx="10" fill="#e6eefc" stroke="#c7ddff"/>
      <text x="150" y="30" font-family="Roboto Mono" font-size="14" text-anchor="middle" fill="#0b4ea8">Genom jądrowy</text>
      <text x="150" y="60" font-family="Roboto Mono" font-size="12" text-anchor="middle" fill="#334155">linearne chromosomy, histony, dziedziczenie dwurodzicielske</text>
      <ellipse cx="500" cy="110" rx="120" ry="70" fill="#fff4db" stroke="#f7e1a0"/>
      <text x="500" y="90" font-family="Roboto Mono" font-size="14" text-anchor="middle" fill="#7a4b0a">mtDNA</text>
      <text x="500" y="120" font-family="Roboto Mono" font-size="12" text-anchor="middle" fill="#475569">koliste, matczyne dziedziczenie, heteroplazmia</text>
      <text x="350" y="200" font-family="Roboto Mono" font-size="12" text-anchor="middle" fill="#64748b">Heteroplazmia: mieszane kopie mtDNA wpływają na nasilenie fenotypu</text>
    </g>
  </g>
</svg>
