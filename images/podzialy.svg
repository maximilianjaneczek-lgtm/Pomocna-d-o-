<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <rect width="100%" height="100%" fill="#ffffff"/>
  <g transform="translate(40,40)">
    <text x="360" y="30" font-family="Poppins, sans-serif" font-size="20" fill="#1e293b" text-anchor="middle">Podziały komórkowe — schemat</text>
    <rect x="0" y="60" width="720" height="360" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
    <g transform="translate(60,110)">
      <rect x="0" y="0" width="220" height="100" fill="#bfdbfe" rx="8"/>
      <text x="110" y="55" font-family="Roboto Mono" font-size="14" text-anchor="middle" fill="#0b5ea8">Interfaza</text>
      <rect x="260" y="0" width="220" height="100" fill="#bbf7d0" rx="8"/>
      <text x="370" y="55" font-family="Roboto Mono" font-size="14" text-anchor="middle" fill="#065f46">Mitoza</text>
      <rect x="520" y="0" width="220" height="100" fill="#fecaca" rx="8"/>
      <text x="630" y="55" font-family="Roboto Mono" font-size="14" text-anchor="middle" fill="#6b213f">Mejoza</text>
      <text x="360" y="160" font-family="Roboto Mono" font-size="12" fill="#475569" text-anchor="middle">profaza → metafaza → anafaza → telofaza</text>
    </g>
  </g>
</svg>
